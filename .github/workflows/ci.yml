name: CLI CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Dist Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 공개 미러는 lockfile 없는 독립 패키지이므로 npm install 사용
      # (setup-node의 cache: npm / npm ci는 lockfile을 요구해 실패한다)
      - name: Install dependencies
        run: npm install

      - name: Verify dist artifact
        run: test -f dist/index.js

      - name: Smoke test CLI
        run: node dist/index.js --help > /dev/null
